name: Lint & Format

on:
    push:
        branches: [ main, master ]
    pull_request:
        branches: [ main, master ]

jobs:
    lint-and-format:
        name: Check linting and formatting
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            -   uses: actions/checkout@v4

            -   uses: actions/setup-node@v4
                with:
                    node-version: lts/*
                    cache: 'npm'

            -   name: Install dependencies
                run: npm ci

            -   name: Run linter and check formatting
                run: npm run lint
